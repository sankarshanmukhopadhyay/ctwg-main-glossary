name: Validate Governance-Executable Glossary

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  validate-governance-glossary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Validate and regenerate glossary artifacts
        run: |
          python tools/validate_governance_glossary.py
          python tools/build_governance_glossary.py
          python tools/build_quality_report.py
          python tools/build_jekyll_site.py

      - name: Fail if generated artifacts drifted
        run: |
          git diff --exit-code -- . ':!docs/'
