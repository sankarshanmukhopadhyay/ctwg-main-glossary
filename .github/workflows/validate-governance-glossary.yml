name: Validate Governance-Executable Glossary

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  validate-governance-glossary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate structured glossary layer
        run: |
          python tools/validate_governance_glossary.py
          python tools/build_governance_glossary.py
