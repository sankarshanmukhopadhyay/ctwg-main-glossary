term: coalition-for-content-provenance-and-authenticity
aliases:
- Coalition for Content Provenance and Authenticity
definition: C2PA is a Joint Development Foundation project of the Linux Foundation
  that addresses the prevalence of misleading information online through the development
  of technical standards for certifying the source and history (or provenance) of
  media content.
