term: concept
aliases:
- concept
- concepts
definition: An abstract idea that enables the classification of entities, i.e., a
  mental construct that enables an instance of a class of entities to be distinguished
  from entities that are not an instance of that class. A concept can be identified
  with a term.
notes: []
see_also:
- glossary
- definition
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/concept.md`'
mental_models: []
supporting_definitions:
- '[eSSIF-Lab](https://essif-lab.github.io/framework/docs/essifLab-glossary#concept):
  the ideas/thoughts behind a classification of [entities](https://essif-lab.github.io/framework/docs/terms/entity)
  (what makes [entities](https://essif-lab.github.io/framework/docs/terms/entity)
  in that class ''the same'').'
- '[Wikipedia](https://en.wikipedia.org/wiki/Concept): A concept is defined as an
  [abstract](https://en.wikipedia.org/wiki/Abstraction) [idea](https://en.wikipedia.org/wiki/Idea).
  It is understood to be a fundamental building block underlying principles, [thoughts](https://en.wikipedia.org/wiki/Thought)
  and [beliefs](https://en.wikipedia.org/wiki/Belief). Concepts play an important
  role in all aspects of [cognition](https://en.wikipedia.org/wiki/Cognition).'
