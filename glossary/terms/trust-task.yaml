term: trust-task
aliases:
- trust task
- trust tasks
definition: A specific task that involves establishing, verifying, or maintaining
  trust relationships or exchanging verifiable messages or verifiable data that can
  be performed on behalf of a trust application by a trust task protocol at Layer
  3 of the ToIP stack.
