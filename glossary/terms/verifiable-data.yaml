term: verifiable-data
aliases:
- verifiable data
definition: Any digital data or object that is digitally signed in such a manner that
  it can be cryptographically verified.
notes:
- In the context of ToIP architecture, verifiable data is signed with the cryptographic
  keys associated with the verifiable identifier (VID) of the data controller.
