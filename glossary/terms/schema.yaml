term: schema
aliases:
  - schema
  - schemas
definition: A framework, pattern, or set of rules for enforcing a specific structure on a digital object or a set of digital data. There are many types of schemas, e.g., data schema, credential verification schema, database schema.
notes:
  - "`credentialSchema` is a Property Definition in the W3C VC Data Model. See section 3.2.1."
