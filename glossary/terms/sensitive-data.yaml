term: sensitive-data
aliases:
- sensitive data
definition: Personal data that a reasonable person would view from a privacy protection
  standpoint as requiring special care above and beyond other personal data.
notes: []
see_also:
- glossary
- definition
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/sensitive-data.md`'
mental_models: []
supporting_definitions:
- '[PEMC IGR](https://kantarainitiative.org/download/pemc-implementors-guidance-report/):
  While all Personal Information may be regarded as sensitive in that an unauthorized
  processing of an individual’s data may be offensive to that person, we use the term
  here to denote information that a reasonable person would view as requiring special
  care above and beyond other personal data. For reference see [GDPR Recital #51](https://www.privacy-regulation.eu/en/recital-51-GDPR.htm)
  or [Sensitive Personal Data](https://w3c.github.io/dpv/dpv/#SensitivePersonalData)
  in the W3C [Data Privacy Vocabulary](https://w3id.org/dpv).'
