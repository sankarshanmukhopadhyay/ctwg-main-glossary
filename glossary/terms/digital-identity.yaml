term: digital-identity
aliases:
- digital identity
- digital identities
- digital ID
- digital IDs
definition: An identity expressed in a digital form for the purpose representing the
  identified entity within a computer system or digital network.
notes: []
see_also:
- glossary
- definition
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/digital-identity.md`'
mental_models: []
supporting_definitions:
- '[eSSIF-Lab](https://essif-lab.github.io/framework/docs/essifLab-glossary): [Digital
  data](https://essif-lab.github.io/framework/docs/essifLab-glossary#data) that enables
  a specific [entity](https://essif-lab.github.io/framework/docs/essifLab-glossary#entity)
  to be distinguished from all others in a specific context.'
- '[Wikipedia](https://en.wikipedia.org/wiki/Digital_identity): Digital identity refers
  to the information utilized by [computer systems](https://en.wikipedia.org/wiki/Computer_systems)
  to represent external entities, including a person, organization, application, or
  device. When used to describe an individual, it encompasses a person''s compiled
  information and plays a crucial role in automating access to computer-based services,
  verifying identity online, and enabling computers to mediate relationships between
  entities.'
