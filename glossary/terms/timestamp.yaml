term: timestamp
aliases:
- timestamp
- timestamps
definition: A token or packet of information that is used to provide assurance of
  timeliness; the timestamp contains timestamped data, including a time, and a signature
  generated by a trusted timestamp authority (TTA).
notes: []
see_also:
- audit
- verification
- governance
- governance-framework
- governing-authority
- trust-registry
sources:
- '[NIST-CSRC](https://csrc.nist.gov/glossary/term/timestamp).'
mental_models: []
supporting_definitions:
- '[TechTarget](https://www.techtarget.com/whatis/definition/timestamp#:~:text=A%20timestamp%20is%20the%20current,minute%20fractions%20of%20a%20second.):
  A timestamp is the current time of an event that a computer records. Through mechanisms,
  such as the [Network Time Protocol](https://www.techtarget.com/searchnetworking/definition/Network-Time-Protocol),
  a computer maintains accurate current time, calibrated to minute fractions of a
  second. Such precision makes it possible for networked computers and applications
  to communicate effectively.'
