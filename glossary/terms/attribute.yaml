term: attribute
aliases:
  - attribute
  - attributes
definition: An identifiable set of data that describes an entity, which is the subject of the attribute.
notes:
  - An identifier is an attribute that uniquely identifies an entity within some context.
see_also:
  - property.
sources:
  []
