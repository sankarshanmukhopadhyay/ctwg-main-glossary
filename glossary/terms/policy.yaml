term: policy
aliases:
  - policy
  - policies
definition: Statements, rules, or assertions that specify required, permitted, prohibited, or expected behavior of an entity within a defined scope. Policies may be human-readable, machine-readable, or both, and may be interpreted, enforced, or audited by people, software, or both.
notes:
  []
see_also:
  - governance framework
  - governance requirement
  - rule.
sources:
  - "[NIST-CSRC](https://csrc.nist.gov/glossary/term/policy)"
mental_models:
  []
supporting_definitions:
  - "Example: An [[ref: authorization]] policy might specify the [[ref: access control]] rules applied by a software component at runtime."
source_file: spec/terms-definitions/policy.md
governance_profile: core-operational
governance:
  authority_scope:
    - policy_definition
    - assurance_and_audit
  delegation_mode: direct
  revocation_supported: true
  lifecycle_states:
    - proposed
    - active
    - suspended
    - revoked
    - retired
  execution_role: runtime
  control_plane_role: decision_plane_component
  enforcement_points:
    - policy_approval
    - revocation_decision
assurance:
  evidence_artifacts:
    - policy_document
    - audit_log
  assurance_level_hint: AL2+
  auditability: high
control_plane:
  decision_points:
    - policy_approval
    - revocation_decision
  accountable_entity: auditor
  evidence_produced:
    - policy_document
    - audit_log
crosswalk:
  nist:
    - PL-1
  iso:
    - ISO/IEC 42001 5.2
