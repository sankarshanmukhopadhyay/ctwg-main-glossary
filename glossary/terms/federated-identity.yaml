term: federated-identity
aliases:
- federated identity
- federated identities
definition: A digital identity architecture in which a digital identity established
  on one computer system, network, or trust domain is linked to other computer systems,
  networks, or trust domains for the purpose of identifying the same entity across
  those domains.
notes: []
see_also:
- decentralized identity
- self-sovereign identity.
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/federated-identity.md`'
mental_models: []
supporting_definitions:
- '[NIST-CSRC](https://csrc.nist.gov/glossary/term/federated_identity_management);
  A process that allows for the conveyance of identity and authentication information
  across a set of networked systems.'
- '[Wikipedia](https://en.wikipedia.org/wiki/Federated_identity): A **federated identity**
  in [information technology](https://en.wikipedia.org/wiki/Information_technology)
  is the means of linking a person''s [electronic identity](https://en.wikipedia.org/wiki/Digital_identity)
  and attributes, stored across multiple distinct [identity management](https://en.wikipedia.org/wiki/Identity_management)
  systems.'
