supporting_definitions:
- '[NIST-CSRC](https://csrc.nist.gov/glossary/term/digital_signature): The result
  of a cryptographic transformation of data which, when properly implemented, provides
  the services of: 1. origin authentication, 2. data integrity, and 3. signer non-repudiation.'
