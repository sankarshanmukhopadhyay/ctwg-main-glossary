term: communication-endpoint
aliases:
  - communication endpoint
  - communication endpoints
  - communications endpoint
  - communications endpoints
definition: A type of communication network node. It is an interface exposed by a communicating party or by a communication channel. An example of the latter type of a communication endpoint is a publish-subscribe topic or a group in group communication systems.
