term: legal-entity-identifier
aliases:
  - Legal Entity Identifier
  - Legal Entity Identifiers
  - LEI
  - LEIs
definition: The Legal Entity Identifier (LEI) is a unique global identifier for legal entities participating in financial transactions. Also known as an LEI code or LEI number, its purpose is to help identify legal entities on a globally accessible database. Legal entities are organisations such as companies or government entities that participate in financial transactions.
notes:
  - LEIs are administered by the Global Legal Entity Identifier Foundation (GLEIF).
