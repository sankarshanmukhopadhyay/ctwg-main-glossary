supporting_definitions:
- '[Wikipedia](https://en.wikipedia.org/wiki/Attribute-based_access_control): Attribute-based
  access control (ABAC), also known as policy-based access control for [IAM](https://en.wikipedia.org/wiki/Identity_management),
  defines an access control paradigm whereby a subject''s authorization to perform
  a set of operations is determined by evaluating attributes associated with the subject,
  object, requested operations, and, in some cases, environment attributes.'
