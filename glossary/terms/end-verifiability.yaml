term: end-verifiability
aliases:
- end-verifiability
- end verifiability
definition: a data item or statement may be cryptographically securely attributable
  to its source (party at the source end) by any recipient verifier (party at the
  destination end) without reliance on any infrastructure not under the verifier’s
  ultimate control.
