term: toip-trust-registry-protocol
aliases:
- ToIP Trust Registry Protocol
definition: The open standard trust task protocol defined by the ToIP Foundation to
  perform the trust task of querying a trust registry. The ToIP Trust Registry Protocol
  operates at Layer 3 of the ToIP stack.
