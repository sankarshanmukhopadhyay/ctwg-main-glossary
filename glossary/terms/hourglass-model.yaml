term: hourglass-model
aliases:
  - hourglass model
  - hourglass models
definition: An architectural model for layered systems—and specifically for the protocol layers in a protocol stack—in which a diversity of supporting protocols and services at the lower layers are able to support a great diversity of protocols and applications at the higher layers through the use of a single protocol in the spanning layer in the middle—the “neck” of the hourglass.
notes:
  - The Internet’s TCP/IP stack follows the hourglass model, and it is the design model for the ToIP stack.
see_also:
  - trust spanning protocol.
