term: verification
aliases:
  - verification
  - verify
  - verifies
  - verified
  - verifying
definition: An action an agent (of a principal) performs to determine the authenticity of a claim or other data object. Cryptographic verification uses cryptographic keys.
notes:
  []
see_also:
  - validation.
  - "KERI scope definition of [[xref: keri1"
  - "verification]]"
