term: digital-credential
aliases:
- digital credential
- digital credentials
definition: A credential in digital form that is signed with a digital signature and
  held in a digital wallet. A digital credential is issued to a holder by an issuer;
  a proof of the credential is presented by the holder to a verifier.
notes: []
see_also:
- issuance request
- presentation request
- verifiable credential.
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/digital-credential.md`'
mental_models: []
supporting_definitions:
- 'Contrast with: [[ref: physical credential]].'
- '[Wikipedia](https://en.wikipedia.org/wiki/Digital_credential): Digital credentials
  are the digital equivalent of paper-based [credentials](https://en.wikipedia.org/wiki/Credentials).
  Just as a paper-based credential could be a [passport](https://en.wikipedia.org/wiki/Passport),
  a [driver''s license](https://en.wikipedia.org/wiki/Driver%27s_license), a membership
  certificate or some kind of ticket to obtain some service, such as a cinema ticket
  or a public transport ticket, a digital credential is a proof of qualification,
  competence, or clearance that is attached to a person.'
