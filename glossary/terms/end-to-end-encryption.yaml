term: end-to-end-encryption
aliases:
  - end-to-end encryption
  - end-to-end encrypt
definition: Encryption that is applied to a communication before it is transmitted from the sender’s communication endpoint and cannot be decrypted until after it is received at the receiver’s communication endpoint. When end-to-end encryption is used, the communication cannot be decrypted in transit no matter how many intermediaries are involved in the routing process.
