term: cryptographic-key
aliases:
  - cryptographic key
  - cryptographic keys
  - cryptographic key pair
  - cryptographic key pairs
definition: A key in cryptography is a piece of information, usually a string of numbers or letters that are stored in a file, which, when processed through a cryptographic algorithm, can encode or decode cryptographic data. Symmetric cryptography refers to the practice of the same key being used for both encryption and decryption. Asymmetric cryptography has separate keys for encrypting and decrypting. These keys are known as the public keys and private keys, respectively.
