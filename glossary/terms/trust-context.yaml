term: trust-context
aliases:
- trust context
- trust contexts
definition: 'The context in which a specific party makes a specific trust decision.
  Many different factors may be involved in establishing a trust context, such as:
  the relevant interaction or transaction; the presence or absence of existing trust
  relationships; the applicability of one or more governance frameworks; and the location,
  time, network, and/or devices involved. A trust context may be implicit or explicit;
  if explicit, it may be identified using an identifier. A ToIP governance framework
  is an example of an explicit trust context identified by a verifiable identifier
  (VID).'
