term: non-custodial-wallet
aliases:
- non-custodial wallet
- non-custodial wallets
definition: A digital wallet that is directly in the control of the holder, usually
  because the holder is the device controller of the device hosting the digital wallet
  (smartcard, smartphone, tablet, laptop, desktop, car, etc.) A digital wallet that
  is in the custody of a third party is called a custodial wallet.
