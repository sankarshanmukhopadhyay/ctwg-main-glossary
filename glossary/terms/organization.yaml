term: organization
aliases:
  - organization
  - organizations
  - organisation
  - organisations
definition: A party that consists of a group of parties who agree to be organized into a specific form in order to better achieve a common set of objectives. Examples include corporations, partnerships, sole proprietorships, non-profit organizations, associations, and governments.
notes:
  []
see_also:
