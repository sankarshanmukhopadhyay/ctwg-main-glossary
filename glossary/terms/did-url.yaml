term: did-url
aliases:
- DID URL
- DID URLs
definition: 'A DID plus any additional syntactic component that conforms to the definition
  in section 3.2 of the W3C Decentralized Identifiers (DIDs) 1.0 specification. This
  includes an optional DID path (with its leading / character), optional DID query
  (with its leading ? character), and optional DID fragment (with its leading # character).'
