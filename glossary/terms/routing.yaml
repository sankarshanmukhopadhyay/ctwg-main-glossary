term: routing
aliases:
- routing
- routes
- routed
definition: Routing is the process of selecting a path for traffic in a network or
  between or across multiple networks. Broadly, routing is performed in many types
  of networks, including circuit-switched networks, such as the public switched telephone
  network (PSTN), and computer networks, such as the Internet. A router is a computing
  device that specializes in performing routing.
