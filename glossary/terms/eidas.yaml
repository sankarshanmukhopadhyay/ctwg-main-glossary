term: eidas
aliases:
- eIDAS
definition: eIDAS (electronic IDentification, Authentication and trust Services) is
  an EU regulation with the stated purpose of governing "electronic identification
  and trust services for electronic transactions". It passed in 2014 and its provisions
  came into effect between 2016-2018.
