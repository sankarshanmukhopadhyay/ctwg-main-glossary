term: digital-agent
aliases:
- digital agent
- digital agents
definition: In the context of ​​decentralized digital trust infrastructure, a software
  agent that operates in conjunction with a digital wallet or similar system component
  to take actions on behalf of its controller.
notes:
- A digital agent may act with significant operational authority. Its governance characteristics
  therefore depend on the policies, permissions, lifecycle controls, and revocation
  mechanisms under which it operates.
- In a ToIP context, a digital agent is frequently assumed to have privileged access
  to the digital wallets of its principal. In market parlance, a mobile app that performs
  the actions of a digital agent is often simply called a wallet or a digital wallet.
