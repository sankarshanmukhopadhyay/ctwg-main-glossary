term: autonomic-identity-system
aliases:
- autonomic-identity-system
- autonomic identity system
definition: an identity system that includes a primary root-of-trust in self-certifying
  identifiers that are strongly bound at issuance to a cryptographic signing (public,
  private) key pair. An AIS enables any entity to establish control over an AN in
  an independent, interoperable, and portable way.
