term: man-made-thing
aliases:
- man-made thing
- man-made things
definition: Athing generated by human activity of some kind. Man-made things include
  both active things, such as cars or drones, and passive things, such as chairs or
  trousers.
notes:
- Active things are the equivalent of non-human actors in the eSSIF-Lab mental model
  Parties, Actors, Actions. Also see Appendix B and Appendix C of the Sovrin Glossary.
