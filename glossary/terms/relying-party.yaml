term: relying-party
aliases:
- relying party
- relying parties
definition: A party who accepts claims, credentials, trust graphs, or any other form
  of verifiable data from other parties (such as issuers, holders, trust registries,
  or other authoritative sources) in order to make a trust decision.
notes:
- The term “relying party” is more commonly used in federated identity architecture;
  the term “verifier” is more commonly used with decentralized identity architecture
  and verifiable credentials.
see_also:
- verifier.
