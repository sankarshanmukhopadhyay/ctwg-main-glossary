term: data-schema
aliases:
- data schema
- data schemas
definition: A description of the structure of a digital document or object, typically
  expressed in a machine-readable language in terms of constraints on the structure
  and content of documents or objects of that type. A credential schema is a particular
  type of data schema.
notes: []
see_also:
- credential
- issuer
- issuance
- verifiable-credential
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/data-schema.md`'
mental_models: []
supporting_definitions:
- '[Wikipedia](https://en.wikipedia.org/wiki/XML_schema): An XML schema is a description
  of a type of [XML](https://en.wikipedia.org/wiki/Extensible_Markup_Language) document,
  typically expressed in terms of constraints on the structure and content of documents
  of that type, above and beyond the basic syntactical constraints imposed by XML
  itself. These constraints are generally expressed using some combination of grammatical
  rules governing the order of elements, [Boolean predicates](https://en.wikipedia.org/wiki/Boolean_predicates)
  that the content must satisfy, data types governing the content of elements and
  attributes, and more specialized rules such as [uniqueness](https://en.wikipedia.org/wiki/Uniqueness_quantification)
  and [referential integrity](https://en.wikipedia.org/wiki/Referential_integrity)
  constraints.'
