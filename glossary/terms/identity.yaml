term: identity
aliases:
- identity
- identities
definition: A collection of attributes or other identity data that describe an entity
  and enable it to be distinguished from all other entities within a specific scope
  of identification. Identity attributes may include one or more identifiers for an
  entity, however it is possible to establish an identity without using identifiers.
notes:
- Identity is relational to the party performing the identification. For example,
  if 100 different parties have an identity for the same entity, each of them may
  hold a different set of identity data enabling identification of that entity.
see_also:
- glossary
- definition
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/identity.md`'
mental_models: []
supporting_definitions:
- '[eSSIF-Lab](https://essif-lab.github.io/framework/docs/essifLab-glossary#identity):
  the combined [knowledge](https://essif-lab.github.io/framework/docs/terms/knowledge)
  about that [entity](https://essif-lab.github.io/framework/docs/terms/entity) of
  all [parties](https://essif-lab.github.io/framework/docs/terms/party), i.e. the
  union of all [partial identities](https://essif-lab.github.io/framework/docs/terms/partial-identity)
  of which that [entity](https://essif-lab.github.io/framework/docs/terms/entity)
  is the [subject](https://essif-lab.github.io/framework/docs/terms/subject).'
