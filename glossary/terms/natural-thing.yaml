term: natural-thing
aliases:
- natural thing
- natural things
definition: A thing that exists in the natural world independently of humans. Although
  natural things may form part of a man-made thing, natural things are mutually exclusive
  with man-made things.
notes:
- Natural things (those recognized to have legal rights) can be parties but never
  actors in the eSSIF-Lab mental model Parties, Actors, Actions.
