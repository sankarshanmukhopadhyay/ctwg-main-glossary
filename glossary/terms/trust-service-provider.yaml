term: trust-service-provider
aliases:
- trust service provider
- trust service providers
definition: In the context of specific digital trust ecosystems, such as the European
  Union’s eIDAS regulations, a trust service provider is a legal entity that provides
  specific trust support services as required by legal regulations, trust frameworks,
  or governance frameworks. In the larger context of ToIP infrastructure, a trust
  service provider is a provider of services based on the ToIP stack. Most generally,
  a trust service provider is to the trust layer for the Internet what an Internet
  service provider (ISP) is to the Internet layer.
notes:
- In the industry, the acronym "TSP" is used for both trust service provider and the
  ToIP Trust Spanning Protocol. In the ToIP Glossary, the acronmym "TSP" will only
  be used for the latter.
