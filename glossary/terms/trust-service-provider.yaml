mental_models: []
supporting_definitions:
- 'Wikipedia: A trust service provider (TSP) is a person or legal entity providing
  and preserving [digital certificates](https://en.wikipedia.org/wiki/Digital_certificate)
  to create and validate [electronic signatures](https://en.wikipedia.org/wiki/Electronic_signature)
  and to authenticate their signatories as well as websites in general. Trust service
  providers are qualified [certificate authorities](https://en.wikipedia.org/wiki/Certificate_authority)
  required in the [European Union](https://en.wikipedia.org/wiki/European_Union) and
  in Switzerland in the context of regulated [electronic signing](https://en.wikipedia.org/wiki/Electronic_signature)
  procedures.'
