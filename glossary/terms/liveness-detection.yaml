term: liveness-detection
aliases:
- liveness detection
definition: Any technique used to detect a presentation attack by determining whether
  the source of a biometric sample is a live human being or a fake representation.
  This is typically accomplished using algorithms that analyze biometric sensor data
  to detect whether the source is live or reproduced.
