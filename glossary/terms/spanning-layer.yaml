term: spanning-layer
aliases:
  - spanning layer
definition: A specific layer within a protocol stack that consists of a single protocol explicitly designed to provide interoperability between the protocol layers above it and below it.
notes:
  []
see_also:
  - hourglass model
  - trust spanning layer.
