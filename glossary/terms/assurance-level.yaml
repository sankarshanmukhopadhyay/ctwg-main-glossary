term: assurance-level
aliases:
- assurance level
- assurance levels
definition: A level of confidence in a claim that may be relied on by others. Different
  types of assurance levels are defined for different types of trust assurance mechanisms.
  Examples include authenticator assurance level, federation assurance level, and
  identity assurance level.
notes:
- Assurance levels are most useful when the criteria for each level are explicit,
  testable, and supported by inspectable evidence.
see_also:
- credential
- issuer
- issuance
- verifiable-credential
- authorization
- permission
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/assurance-level.md`'
mental_models: []
supporting_definitions:
- For verifiable credentials, an assurance level measures the degree of certainty
  in an identity's authenticity or a credential's validity. It is influenced by the
  strength of the identity assurance process, the robustness of the authentication
  process, the management of the credential issuer, and the evidence available to
  support those assessments.
