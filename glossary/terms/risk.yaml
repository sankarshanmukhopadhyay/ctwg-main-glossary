term: risk
aliases:
- risk
- risks
definition: The effects that uncertainty (i.e. a lack of information, understanding
  or knowledge of events, their consequences or likelihoods) can have on the intended
  realization of an objective of a party.
notes: []
see_also:
- glossary
- definition
sources:
- '[eSSIF-Lab](https://essif-lab.github.io/framework/docs/essifLab-glossary)'
mental_models: []
supporting_definitions:
- '[NIST-CSRC](https://csrc.nist.gov/glossary/term/risk): A measure of the extent
  to which an entity is threatened by a potential circumstance or event, and typically
  a function of: (i) the adverse impacts that would arise if the circumstance or event
  occurs; and (ii) the likelihood of occurrence.'
