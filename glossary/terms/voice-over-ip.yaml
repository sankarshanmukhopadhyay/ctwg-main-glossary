term: voice-over-ip
aliases:
  - Voice over IP
  - VoIP
definition: Voice over Internet Protocol (VoIP), also called IP telephony, is a method and group of technologies for voice calls for the delivery of voice communication sessions over Internet Protocol (IP) networks, such as the Internet.
