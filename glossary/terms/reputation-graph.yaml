term: reputation-graph
aliases:
  - reputation graph
  - reputation graphs
definition: A graph of the reputation relationships between different entities in a trust community. In a digital trust ecosystem, the governing body may be one trust anchor of a reputation graph. In some cases, a reputation graph can be traversed by making queries to one or more trust registries.
