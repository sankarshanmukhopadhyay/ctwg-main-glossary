- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/credential.md`'
mental_models: []
supporting_definitions:
- '[eSSIF-Lab](https://essif-lab.github.io/framework/docs/terms/credential): data,
  representing a set of [assertions](https://essif-lab.github.io/framework/docs/terms/assertion)
  (claims, statements), authored and signed by, or on behalf of, a specific [party](https://essif-lab.github.io/framework/docs/terms/party).'
- '[W3C VC](https://www.w3.org/TR/vc-data-model/#terminology): A set of one or more
  [claims](https://www.w3.org/TR/vc-data-model/#dfn-claims) made by an [issuer](https://www.w3.org/TR/vc-data-model/#dfn-issuers).'
