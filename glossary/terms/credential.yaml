term: credential
aliases:
- credential
- credentials
definition: A container of claims describing one or more subjects. A credential is
  generated by the issuer of the credential and given to the holder of the credential.
  A credential typically includes a signature or some other means of proving its authenticity.
  A credential may be either a physical credential or a digital credential.
notes: []
see_also:
- verifiable credential.
