term: sociotechnical-system
aliases:
  - sociotechnical system
  - sociotechnical systems
  - sociotechnical
definition: An approach to complex organizational work design that recognizes the interaction between people and technology in workplaces. The term also refers to coherent systems of human relations, technical objects, and cybernetic processes that inhere to large, complex infrastructures. Social society, and its constituent substructures, qualify as complex sociotechnical systems.
