term: guardianship-arrangement
aliases:
  - guardianship arrangement
  - guardianship arrangements
  - guardianship
  - guardianships
definition: "A guardianship arrangement (in a jurisdiction) is the specification of a set of rights and duties between legal entities of the [[ref: jurisdiction] that enforces these rights and duties, for the purpose of caring for, protecting, guarding, and defending one or more of these [[erf: entities]]. At a minimum, the entities participating in a guardianship arrangement are the guardian and the dependent."
