term: human-experience
aliases:
- human experience
definition: The processes, patterns and rituals of acquiring knowledge or skill from
  doing, seeing, or feeling things as a natural person. In the context of decentralized
  digital trust infrastructure, the direct experience of a natural person using trust
  applications to make trust decisions within one or more digital trust ecosystems.
notes:
- Human experience includes social experiences (e.g., rituals, behaviors, ceremonies
  and rites of passage), as well as customer experience, worker or employee experience,
  and user experience.
