term: identification
aliases:
  - identification
  - identify
  - identified
  - identifies
  - identifying
definition: The action of a party obtaining the set of identity data necessary to serve as that party’s identity for a specific entity.
notes:
  - The act of identification of a specific entity is relational to each party that needs to perform that action. Therefore each party may end up with their own set of identity data that meets their specific requirements for their specific scope.
