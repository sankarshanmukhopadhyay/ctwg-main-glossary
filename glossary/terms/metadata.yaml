term: metadata
aliases:
  - metadata
definition: Information describing the characteristics of data including, for example, structural metadata describing data structures (e.g., data format, syntax, and semantics) and descriptive metadata describing data contents (e.g., information security labels).
notes:
  []
see_also:
  - communication metadata.
sources:
  - "[NIST-CSRC](https://csrc.nist.gov/glossary/term/metadata)."
mental_models:
  []
supporting_definitions:
  - "[Wikipedia](https://en.wikipedia.org/wiki/Metadata): Metadata (or metainformation) is \"[data](https://en.wikipedia.org/wiki/Data) that provides information about other data\", but not the content of the data itself, such as the text of a message or the image itself."
