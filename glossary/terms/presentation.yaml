term: presentation
aliases:
  - presentation
  - presentations
  - present
  - presents
  - presenting
  - presented
definition: A verifiable message that a holder may send to a verifier containing proofs of one or more claims derived from one or more digital credentials from one or more issuers as a response to a specific presentation request from a  verifier.
