term: zero-knowledge-proof
aliases:
  - zero-knowledge proof
  - zero-knowledge proofs
  - ZKP
  - ZKPs
definition: A specific kind of cryptographic proof that proves facts about data to a verifier without revealing the underlying data itself. A common example is proving that a person is over or under a specific age without revealing the person’s exact birthdate.
