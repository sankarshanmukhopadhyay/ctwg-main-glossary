term: public-key-certificate
aliases:
  - public key certificate
  - public key certificates
  - PKC
  - PKCs
definition: A set of data that uniquely identifies a public key (which has a corresponding private key) and an owner that is authorized to use the key pair. The certificate contains the owner’s public key and possibly other information and is digitally signed by a certification authority (i.e., a trusted party), thereby binding the public key to the owner.
