mental_models: []
supporting_definitions:
- '[Wikipedia](https://en.wikipedia.org/wiki/Public_key_infrastructure): A public
  key infrastructure (PKI) is a set of roles, policies, hardware, software and procedures
  needed to create, manage, distribute, use, store and revoke [digital certificates](https://en.wikipedia.org/wiki/Public_key_certificate)
  and manage [public-key encryption](https://en.wikipedia.org/wiki/Public-key_cryptography).
  The purpose of a PKI is to facilitate the secure electronic transfer of information
  for a range of network activities such as e-commerce, internet banking and confidential
  email.'
