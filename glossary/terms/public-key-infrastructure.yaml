term: public-key-infrastructure
aliases:
- public key infrastructure
- public key infrastructures
- PKI
- PKIs
definition: A set of policies, processes, server platforms, software and workstations
  used for the purpose of administering certificates and public-private key pairs,
  including the ability to issue, maintain, and revoke public key certificates. The
  PKI includes the hierarchy of certificate authorities that allow for the deployment
  of digital certificates that support encryption, digital signature and authentication
  to meet business and security requirements.
notes: []
