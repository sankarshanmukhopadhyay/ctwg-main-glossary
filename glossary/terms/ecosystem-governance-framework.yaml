term: ecosystem-governance-framework
aliases:
  - ecosystem governance framework
  - ecosystem governance frameworks
  - EGF
  - EGFs
definition: A governance framework for a digital trust ecosystem. An ecosystem governance framework may incorporate, aggregate, or reference other types of governance frameworks such as a credential governance framework or a utility governance framework.
notes:
  - An ecosystem governance framework typically defines the authoritative scope within which participants, registries, policies, and recognition decisions are coordinated.
