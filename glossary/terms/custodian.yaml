term: custodian
aliases:
- custodian
- custodians
definition: A third party that has been assigned rights and duties in a custodianship
  arrangement for the purpose of hosting and safeguarding a principal's private keys,
  digital wallet and digital assets on the principal’s behalf. Depending on the custodianship
  arrangement, the custodian may act as an exchange and provide additional services,
  such as staking, lending, account recovery, or security features.
notes:
- While a custodian technically has the necessary access to in theory impersonate
  the principal, in most cases a custodian is expressly prohibited from taking any
  action on the principal’s account unless explicitly authorized by the principal.
  This is what distinguishes custodianship from guardianship.
see_also:
- custodial wallet.
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/custodian.md`'
