- '[NIST-CSRC](https://csrc.nist.gov/glossary/term/custodian): A third-party [[ref:
  entity]] that holds and safeguards a user’s [[ref: private keys]] or digital assets
  on their behalf. Depending on the system, a custodian may act as an exchange and
  provide additional services, such as staking, lending, account recovery, or security
