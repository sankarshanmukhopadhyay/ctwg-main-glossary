mental_models: []
supporting_definitions:
- '[eSSIF-Lab](https://essif-lab.github.io/framework/docs/essifLab-glossary#controller):
  the role that an [actor](https://essif-lab.github.io/framework/docs/terms/actor)
  performs as it is executing actions on that [entity](https://essif-lab.github.io/framework/docs/terms/entity)
  for the purpose of ensuring that the [entity](https://essif-lab.github.io/framework/docs/terms/entity)
  will act/behave, or be used, in a particular way.'
