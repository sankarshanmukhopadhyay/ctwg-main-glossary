term: controller
aliases:
- controller
- controllers
definition: In the context of digital communications, the entity in control of sending
  and receiving digital communications. In the context of decentralized digital trust
  infrastructure, the entity in control of the cryptographic keys necessary to perform
  cryptographically verifiable actions using a digital agent and digital wallet. In
  a ToIP context, the entity in control of a ToIP endpoint.
notes: []
see_also:
- device controller
- DID controller
- ToIP controller.
