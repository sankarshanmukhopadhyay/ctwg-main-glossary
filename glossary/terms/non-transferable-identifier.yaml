term: non-transferable-identifier
aliases:
- non-transferable-identifier
definition: Controlling keys over this identifier cannot be rotated and therefore
  this identifier is non-transferable to other control.
notes: []
see_also:
- glossary
- definition
- identifier
- decentralized-identifier
sources:
- 'ToIP CTWG maintained glossary source: `spec/terms-definitions/non-transferable-identifier.md`'
mental_models: []
supporting_definitions:
- 'An identifier of this type has specific positive features like short-lived, peer
  to peer, one-time use, discardable, etc. that are very practical in certain use
  cases. Moreover non-transferable identifiers are much easier to govern than persistent
  identifiers that are [[ref: transferable]].'
- More in <a href="https://weboftrust.github.io/WOT-terms/docs/glossary/non-transferable-identifier">extended
  KERI glossary</a>
