term: authority
aliases:
- authority
- authorities
definition: A party whose decisions, policies, rules, or recognition outcomes are
  accepted as governing, directive, or controlling by other parties within a defined
  scope.
notes:
- The practical significance of an authority depends on the scope in which its decisions
  are recognized, how that scope is established, and whether that recognition can
  be delegated, constrained, contested, or revoked.
