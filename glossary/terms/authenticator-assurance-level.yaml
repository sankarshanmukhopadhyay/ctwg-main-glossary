term: authenticator-assurance-level
aliases:
  - authenticator assurance level
  - authenticator assurance levels
  - AAL
  - AALs
definition: A measure of the strength of an authentication mechanism and, therefore, the confidence in it.
notes:
  - "In NIST SP 800-63-3, AAL is defined in terms of three levels: AAL1 (Some confidence), AAL2 (High confidence), AAL3 (Very high confidence)."
see_also:
  - federation assurance level
  - identity assurance level
  - identity binding.
