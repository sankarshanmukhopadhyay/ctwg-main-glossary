term: access-control
aliases:
- access control
- access controls
definition: The process of granting or denying specific requests for obtaining and
  using information and related information processing services.
notes: []
see_also:
- authorization
- permission
- role-based-access-control
- attribute-based-access-control
sources:
- '[NIST-CSRC](https://csrc.nist.gov/glossary/term/access_control).'
mental_models: []
supporting_definitions:
- '[Wikipedia](https://en.wikipedia.org/wiki/Access_control): In [physical security](https://en.wikipedia.org/wiki/Physical_security)
  and [information security](https://en.wikipedia.org/wiki/Information_security),
  access control (AC) is the selective restriction of access to a place or other resource,
  while access management describes the process. The act of accessing may mean consuming,
  entering, or using. Permission to access a resource is called [[ref: authorization]].'
