term: authentication
aliases:
- authentication
- authenticate
- authenticates
- authenticated
- authenticating
definition: Verifying the identity of a user, process, or device, often as a prerequisite
  to allowing access to resources in an information system.
notes: []
see_also:
- authenticator
- verifiable message.
sources:
- '[NIST-CSRC](https://csrc.nist.gov/glossary/term/authentication).'
mental_models: []
supporting_definitions:
- '[Wikipedia](https://en.wikipedia.org/wiki/Authentication): The act of proving an
  [assertion](https://en.wikipedia.org/wiki/Logical_assertion), such as the [identity](https://en.wikipedia.org/wiki/Digital_identity)
  of a computer system user.'
