term: control-authority
aliases:
  - control-authority
  - control authority
definition: In identity systems, control authority is the power to determine who controls what. It is a primary factor in determining the basis for trust in those systems.
notes:
  - Control authority is especially important because it identifies where effective operational power resides, including the power to change, invalidate, or reassign control relationships.
