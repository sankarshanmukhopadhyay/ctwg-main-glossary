term: biometric
aliases:
- biometric
- biometrics
definition: A measurable physical characteristic or personal behavioral trait used
  to recognize the AID, or verify the claimed identity, of an applicant. Facial images,
  fingerprints, and iris scan samples are all examples of biometrics.
