term: gateway
aliases:
  - gateway
  - gateways
definition: "A gateway is a piece of networking hardware or software used in telecommunications networks that allows data to flow from one discrete network to another. Gateways are distinct from routers or switches in that they communicate using more than one protocol to connect multiple networks<sup>\\[1\\]\\[2\\]</sup>#cite_note-1) and can operate at any of the seven layers of the open systems interconnection model (OSI)."
