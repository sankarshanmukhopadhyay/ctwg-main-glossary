term: contextual-linkability
aliases:
  - contextual-linkability
  - contextual linkability
definition: Refers to the condition where vendors or other data capture points provide enough context at point of capture to be able to use statistical correlation with existing data sets to link any of a person's disclosed attributes to a set of already known data points about a given person.
