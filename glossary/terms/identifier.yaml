supporting_definitions:
- '[eSSIF-Lab](https://essif-lab.github.io/framework/docs/essifLab-glossary#identifier):
  a character string that is being used for the identification of some [entity](https://essif-lab.github.io/framework/docs/terms/entity)
  (yet may refer to 0, 1, or more [entities](https://essif-lab.github.io/framework/docs/terms/entity),
  depending on the context within which it is being used).'
